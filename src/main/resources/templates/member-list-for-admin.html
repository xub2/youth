<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>주일 예배 출석 명단 관리</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" th:href="@{/images/favicon.ico}" type="image/x-icon">
    <style>
        .is-hard-badge { background-color: #ffc107; color: #000; font-weight: bold; }
        .table { vertical-align: middle; }
        /* 요약 카드 스타일 추가 */
        .summary-card { border: none; border-left: 5px solid; }
        .is-hard-badge { background-color: #ffc107; color: #000; font-weight: bold; }
        /* [추가] 편성 제외 뱃지 스타일 (진한 회색 배경, 흰색 글씨) */
        .is-excluded-badge { background-color: #6c757d; color: #fff; font-weight: bold; }

        .table { vertical-align: middle; }
        .summary-card { border: none; border-left: 5px solid; }
    </style>
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-dark">주일 예배 출석 명단</h2>
        <div>
            <a th:href="@{/member/export}" class="btn btn-success shadow-sm fw-bold">
                <i class="bi bi-file-earmark-excel"></i> 명단 엑셀 다운로드
            </a>
            <a th:href="@{/}" class="btn btn-outline-primary shadow-sm">메인으로 돌아가기</a>
        </div>
    </div>

    <div class="card shadow-sm mb-4 border-0" style="border-color: black !important;">
        <div class="card-header bg-white fw-bold">출석 인원 등록</div>
        <div class="card-body p-4">
            <form th:action="@{/member/add}" method="post">
                <div class="row g-3 align-items-end">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">이름</label>
                        <input type="text" name="name" class="form-control" placeholder="이름 입력" required>
                    </div>
                    <div class="col-md-3">
                        <div class="form-check form-switch mb-2">
                            <input class="form-check-input" type="checkbox" name="isHard" id="isHardAdmin">
                            <label class="form-check-label ms-2 fw-bold" for="isHardAdmin">리더 불가시 체크 바랍니다</label>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <button type="submit" class="btn btn-success w-100 fw-bold">등록하기</button>
                    </div>
                    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>
                        <span th:text="${error}">에러 메시지</span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
            <div class="card summary-card border-primary shadow-sm h-100">
                <div class="card-body p-3">
                    <p class="text-muted mb-1 small fw-bold">전체 인원</p>
                    <h4 class="fw-bold mb-0 text-primary" th:text="${members.size()} + '명'">0명</h4>
                </div>
            </div>
        </div>

        <div class="col-6 col-md-3">
            <div class="card summary-card border-secondary shadow-sm h-100">
                <div class="card-body p-3">
                    <p class="text-muted mb-1 small fw-bold">목장 편성 대상</p>
                    <h4 class="fw-bold mb-0 text-secondary"
                        th:text="${#lists.size(members.?[!excluded])} + '명'">0명</h4>
                </div>
            </div>
        </div>

        <div class="col-6 col-md-3">
            <div class="card summary-card border-success shadow-sm h-100">
                <div class="card-body p-3">
                    <p class="text-muted mb-1 small fw-bold">리더 가능</p>
                    <h4 class="fw-bold mb-0 text-success"
                        th:text="${#lists.size(members.?[!excluded and !isHard])} + '명'">0명</h4>
                </div>
            </div>
        </div>

        <div class="col-6 col-md-3">
            <div class="card summary-card border-warning shadow-sm h-100">
                <div class="card-body p-3">
                    <p class="text-muted mb-1 small fw-bold">리더 불가</p>
                    <h4 class="fw-bold mb-0 text-warning"
                        th:text="${#lists.size(members.?[!excluded and isHard])} + '명'">0명</h4>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-dark">
                <tr>
                    <th class="ps-4">번호</th> <th>이름</th>
                    <th>리더 불가 여부</th>
                    <th class="text-center">목장 편성 여부</th>
                    <th class="text-center">목장 편성 제외</th>
                    <th class="text-center">삭제</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="member, stat : ${members}">
                    <td class="ps-4 text-muted">
                        <span th:text="${stat.count}">1</span> </td>
                    <td>
                        <span th:text="${member.name}" class="fw-bold fs-5">이름</span>
                    </td>
                    <td>
                        <span th:if="${member.isHard}" class="badge is-hard-badge p-2">리더 불가</span>
<!--                        <span th:unless="${member.isHard}" class="badge bg-success p-2">리더 가능</span>-->
                    </td>

                    <td class="text-center align-middle">
                        <span th:if="${member.excluded}" class="badge is-excluded-badge p-2">
                            편성 제외
                        </span>
                    </td>

                    <td class="text-center align-middle">
                        <form th:action="@{/member/exclude/{id}(id=${member.id})}" method="post" style="display: inline;">
                            <button th:if="${member.excluded}" type="submit"
                                    class="btn btn-sm btn-outline-primary fw-bold">
                                목장 편성 포함
                            </button>
                            <button th:unless="${member.excluded}" type="submit"
                                    class="btn btn-sm btn-outline-secondary fw-bold">
                                목장 편성 제외
                            </button>
                        </form>
                    </td>

                    <td class="text-center">
                        <form th:action="@{/member/admin/delete/{id}(id=${member.id})}" method="post"
                              th:onsubmit="return confirm('정말 ' + [[${member.name}]] + '님을 삭제하시겠습니까?');">
                            <button type="submit" class="btn btn-sm btn-outline-danger px-3 fw-bold">
                                <i class="bi bi-trash3"></i> 삭제
                            </button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(members)}">
                    <td colspan="4" class="text-center py-5 text-muted">등록된 인원이 없습니다.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="mt-5 p-4 bg-white rounded shadow-sm border border-danger-subtle">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h5 class="text-danger fw-bold mb-1"><i class="bi bi-exclamation-octagon-fill"></i> 전체 인원 삭제 주의</h5>
                <p class="text-muted small mb-0">매주 새로운 출석을 시작하기 위해 현재 등록된 모든 인원을 삭제합니다.</p>
            </div>
            <form th:action="@{/member/clear}" method="post"
                  onsubmit="return confirm('주의! 모든 출석 명단이 영구히 삭제됩니다. 정말 진행하시겠습니까?')">
                <button type="submit" class="btn btn-danger btn-lg fw-bold px-4">
                    <i class="bi bi-trash-fill"></i> 출석 인원 전체 삭제
                </button>
            </form>
        </div>
    </div>

    <div class="mt-4 text-end text-muted">
        <small>* 이 페이지는 관리자 확인용입니다. 메인 화면에서는 리더 불가 정보가 노출되지 않습니다.</small>
    </div>
</div>
<script th:inline="javascript">
    /*<![CDATA[*/
    var message = /*[[${message}]]*/ null;
    if (message) alert(message);

    var error = /*[[${error}]]*/ null;
    if (error) alert(error);
    /*]]>*/
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
