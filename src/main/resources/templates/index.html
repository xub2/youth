<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>다니엘 청년부 목장 랜덤 편성</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .btn-xl { padding: 1.2rem 1rem; font-size: 1.2rem; }
        .role-badge { font-size: 0.8rem; padding: 0.4em 0.6em; }
        .card { border-radius: 15px; border: none; transition: transform 0.2s; }
        .card:hover { transform: translateY(-3px); }
        .shadow-xs { box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05); }
        /* 명단 가로 나열을 위한 스타일 */
        .member-tag { background: white; border: 1px solid #dee2e6; border-radius: 20px; padding: 5px 15px; display: inline-block; margin-bottom: 5px; font-weight: 500; }
    </style>
</head>
<body class="bg-light">
<div class="container py-4">

    <div class="text-center mb-5">
        <img th:src="@{/images/logo.png}" alt="청년부 로고"
             style="width: 90%; max-width: 500px; height: auto; object-fit: contain;">
    </div>

    <div class="row">
        <div class="col-12">
            <div th:if="${teams != null and !teams.isEmpty()}">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="fw-bold border-start border-5 border-primary ps-3 text-dark mb-0">목장 배정 결과</h4>
                    <span class="text-muted small">총 <span th:text="${membersCount}">0</span>명 편성</span>
                </div>

                <div class="row row-cols-1 row-cols-md-3 g-3">
                    <div class="col" th:each="team : ${teams}">
                        <div class="card shadow h-100 border-top border-5 border-primary">
                            <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
                                <span class="fw-bold fs-4 text-primary" th:text="${team.teamName} + ' 목장'">D 목장</span>
                                <span class="badge rounded-pill bg-light text-dark border" th:text="${team.members.size()} + '명'">0</span>
                            </div>
                            <div class="card-body p-3 bg-light">
                                <div class="row row-cols-1 g-2">
                                    <div th:each="m : ${team.members}" class="col">
                                        <div class="bg-white border rounded-3 p-3 shadow-xs d-flex justify-content-between align-items-center">
                                            <span th:text="${m.name}" class="fw-bold fs-6 text-dark">이름</span>
                                            <div class="d-flex gap-1">
                                                <span th:if="${m.role.name() == 'MC'}" class="badge bg-danger p-2 role-badge">일일 리더</span>
                                                <span th:if="${m.role.name() == 'HELPER'}" class="badge bg-success p-2 role-badge">일일 헬퍼</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div th:unless="${teams != null and !teams.isEmpty()}"
                 class="d-flex align-items-center justify-content-center border rounded-4 bg-white mb-5 shadow-sm"
                 style="min-height: 400px; border-style: dashed !important; border-width: 2px !important;">
                <div class="text-center text-muted p-5">
                    <i class="bi bi-people-fill" style="font-size: 4rem; opacity: 0.2;"></i>
                    <p class="mt-3 fs-4">현재 명단이 등록되었습니다.<br>아래 <strong>[랜덤 목장 생성]</strong> 버튼을 눌러주세요.</p>
                </div>
            </div>
        </div>
    </div>

    <div class="row mt-5 pt-5 border-top g-4">
        <div class="col-lg-8">
            <h5 class="fw-bold text-dark mb-3"><i class="bi bi-card-checklist me-2"></i>오늘의 출석 명단 (<span th:text="${membersCount}">0</span>)</h5>
            <div class="p-4 bg-white rounded-4 border shadow-sm">
                <div class="d-flex flex-wrap gap-2">
                    <div th:each="member : ${members}" class="member-tag shadow-xs">
                        <span th:text="${member.name}">이름</span>
                    </div>
                    <div th:if="${membersCount == 0}" class="py-4 text-center w-100 text-muted">
                        등록된 인원이 없습니다. 관리자 페이지에서 인원을 추가해 주세요.
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <h5 class="fw-bold text-dark mb-3"><i class="bi bi-gear-fill me-2"></i>관리 메뉴</h5>
            <div class="d-grid gap-3">
                <form th:action="@{/assign}" method="post">
                    <button type="submit" class="btn btn-primary btn-xl w-100 fw-bold shadow"
                            onclick="return confirm('랜덤 배정을 실행하시겠습니까?')">
                        <i class="bi bi-shuffle me-2"></i>랜덤 목장 생성
                    </button>
                </form>
                <div class="row g-2">
                    <div class="col-6">
                        <a th:href="@{/member/list/admin}" class="btn btn-outline-secondary py-3 w-100 fw-bold">
                            <i class="bi bi-person-gear"></i> 명단 관리
                        </a>
                    </div>
                    <div class="col-6">
                        <form th:action="@{/member/clear}" method="post" onsubmit="return confirm('전체 명단을 삭제하시겠습니까?')">
                            <button type="submit" class="btn btn-outline-danger py-3 w-100 fw-bold">
                                <i class="bi bi-trash"></i> 전체 삭제
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    var message = /*[[${message}]]*/ null;
    if (message) alert(message);

    var error = /*[[${error}]]*/ null;
    if (error) alert(error);
    /*]]>*/
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
