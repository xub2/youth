<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>다니엘 청년부 - 메인</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<!--    <script type="text/javascript"-->
<!--            th:src="'//dapi.kakao.com/v2/maps/sdk.js?appkey=' + ${kakaoMapKey}"></script>-->
    <style>
        body { background-color: #f8f9fa; }
        /* 메뉴 버튼 스타일 커스텀 */
        .btn-menu {
            height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1rem;
            border-radius: 15px;
            transition: all 0.2s;
        }
        .btn-menu:hover:not(:disabled) {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .btn-menu i {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }
        /* 메인 카드 이미지 영역 */
        .main-card {
            border-radius: 20px;
            overflow: hidden;
            border: none;
            min-height: 450px;
        }
        .welcome-text {
            position: absolute;
            bottom: 30px;
            left: 30px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        /* SNS 카드 스타일 */
        .sns-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 10px;
            background: white;
            border-radius: 20px;
            text-decoration: none;
            color: #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: all 0.2s;
            border: 1px solid #f0f0f0;
            height: 100%;
        }
        .sns-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            color: #000;
        }

        /* 동그라미 아이콘 공통 */
        .sns-circle {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            margin-bottom: 12px;
            color: white;
        }

        /* 서비스별 색상 */
        .insta { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        .youtube { background-color: #FF0000; }
        .kakao { background-color: #FEE500; color: #3C1E1E; } /* 카카오는 검정 아이콘 */
        .home { background-color: #4A90E2; }

        .sns-label {
            font-weight: 600;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
<div class="container py-4">
    <div class="text-center mb-5">
        <img th:src="@{/images/logo.png}" alt="청년부 로고"
             style="width: 90%; max-width: 500px; height: auto; object-fit: contain;">
    </div>

    <div class="row g-4">
        <div class="col-lg-8">
            <div class="card main-card shadow-sm bg-dark text-white position-relative">
                <img th:src="@{/images/daniel-photo.png}" class="card-img h-100 object-fit-cover opacity-75" alt="청년부 이미지"
                     onerror="this.src='https://images.unsplash.com/photo-1529070538774-1843cb3265df?auto=format&fit=crop&q=80&w=1000'">
                <div class="welcome-text">
                    <h2 class="fw-bold">Welcome!</h2>
                    <p class="fs-5 mb-0">함께 세워가는 즐거운 공동체, 대화교회 다니엘 청년부입니다.</p>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="d-flex flex-column gap-3 h-100">
                <a th:href="@{/bulletin/latest}" target="_blank" class="btn btn-white btn-menu shadow-sm border bg-white">
                    <i class="bi bi-book-half text-primary"></i>
                    이번 주 주보 보기
                </a>
                <a th:href="@{/member/list/admin}" class="btn btn-white btn-menu shadow-sm border bg-white">
                    <i class="bi bi-person-check text-success"></i>
                    출석 인원 관리
                </a>

                <a th:href="@{/assign/result}" class="btn btn-white btn-menu shadow-sm border bg-white">
                    <i class="bi bi-shuffle text-success"></i>
                    목장 랜덤 배정
                </a>
                <button sec:authorize="isAnonymous()" class="btn btn-light btn-menu border text-muted" disabled>
                    <i class="bi bi-lock-fill"></i>
                    주보 관리 (로그인 필요)
                </button>

                <div sec:authorize="isAuthenticated()" class="d-flex flex-column gap-2 p-2 border rounded-3 bg-light shadow-sm">
                    <span class="small fw-bold text-center mb-1"><i class="bi bi-file-earmark-pdf"></i> 주보 교체</span>
                    <form th:action="@{/admin/bulletin/upload}" method="post" enctype="multipart/form-data">
                        <div class="input-group input-group-sm">
                            <input type="file" name="file" class="form-control" accept="application/pdf">
                            <button class="btn btn-dark" type="submit">업로드</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="container mb-5">
    <div class="row g-4">
        <div class="col-lg-7">
            <div class="card border-0 shadow-sm overflow-hidden" style="border-radius: 20px;">
                <div class="card-header bg-white py-3 border-0">
                    <h5 class="card-title fw-bold mb-0">
                        <i class="bi bi-geo-alt-fill text-danger me-2"></i>찾아오시는 길 : 수정중
                    </h5>
                </div>
                <img th:src="@{/images/map.png}" class="img-fluid" alt="교회 위치"
                     style="width: 100%; height: 320px; object-fit: cover;">
                <div class="card-body bg-light py-2 px-3">
                    <p class="mb-0 text-secondary small text-center">대화교회: 경기 고양시 일산동구 노루목로 112</p>
                </div>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="fw-bold mb-3 ps-1"><i class="bi bi-link-45deg me-1"></i>SNS 소식</div>
            <div class="row g-3">
                <div class="col-6">
                    <a href="https://www.instagram.com/daniel.__.youth/" target="_blank" class="sns-card">
                        <div class="sns-circle insta"><i class="bi bi-instagram"></i></div>
                        <span class="sns-label">청년부 인스타그램</span>
                    </a>
                </div>
                <div class="col-6">
                    <a href="https://www.instagram.com/comong_daong/" target="_blank" class="sns-card">
                        <div class="sns-circle insta"><i class="bi bi-instagram"></i></div>
                        <span class="sns-label">미디어팀 인스타그램</span>
                    </a>
                </div>
                <div class="col-6">
                    <a href="https://www.youtube.com/@comebackhome-dl6gt" target="_blank" class="sns-card">
                        <div class="sns-circle youtube"><i class="bi bi-youtube"></i></div>
                        <span class="sns-label">유튜브</span>
                    </a>
                </div>
                <div class="col-6">
                    <a href="https://www.dhch1.org/" target="_blank" class="sns-card">
                        <div class="sns-circle home"><i class="bi bi-house-door-fill"></i></div>
                        <span class="sns-label">대화교회 홈페이지</span>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>


<script th:inline="javascript">
    /*<![CDATA[*/
    var message = /*[[${message}]]*/ null;
    if (message) alert(message);
    var error = /*[[${error}]]*/ null;
    if (error) alert(error);
    /*]]>*/
</script>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
