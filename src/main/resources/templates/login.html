<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>로그인</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" th:href="@{/images/favicon.ico}" type="image/x-icon">
</head>
<body class="bg-light">
<div class="container d-flex align-items-center justify-content-center vh-100">
    <div class="card shadow-sm p-4" style="width: 100%; max-width: 400px;">
<!--        <h3 class="text-center mb-4">다니엘 청년부 랜덤 목장</h3>-->

        <div class="text-center mb-4">
            <img th:src="@{/images/logo.png}" alt="다니엘 청년부"
                 style="width: 90%; max-width: 300px; height: auto;">
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <input type="text" name="username" class="form-control form-control-lg"
                       th:classappend="${errorMessage != null} ? 'is-invalid' : ''"
                       placeholder="아이디" required>
            </div>
            <div class="mb-3">
                <input type="password" name="password" class="form-control form-control-lg"
                       th:classappend="${errorMessage != null} ? 'is-invalid' : ''"
                       placeholder="비밀번호" required>

                <div th:if="${errorMessage}" class="invalid-feedback d-block mt-2">
                    [[${errorMessage}]]
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100">로그인</button>
        </form>
    </div>
</div>
</body>
</html>
