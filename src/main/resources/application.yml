spring:
  application:
    name: group-random
  mvc:
    static-path-pattern: /ui/**
  messages:
    basename: errors
  sql:
    init:
      mode: always
      platform: mysql
  datasource:
    url: jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:daniel}?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&rewriteBatchedStatements=true
    username: ${MYSQLUSER:daniel_user}
    password: ${MYSQLPASSWORD:daniel1234}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10 # 50인 규모이므로 32까지는 필요 없으며 10 정도로도 충분합니다.
  jpa:
    database: mysql
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        default_batch_fetch_size: 100
    defer-datasource-initialization: true

server:
  tomcat:
    connection-timeout: 60000
  servlet:
    session:
      timeout: 30m # 세션 타임아웃은 너무 짧으면 입력 도중 로그아웃될 수 있어 30분 기본값 권장합니다.
jwt:
  #32글자 이상 인코딩된 문자열 넣기 : jwtloginjwtloginjwtloginjwtlogin -> and0bG9naW5qd3Rsb2dpbmp3dGxvZ2luand0bG9naW4=
  secret: ${JWT_SECRET:and0bG9naW5qd3Rsb2dpbmp3dGxvZ2luand0bG9naW4=}
  expiration: 3000 #분단위 -> 갱신을 위한 refresh Token 이란게 있다

admin:
  username: ${ADMIN_USERNAME:daniel}
  password: ${ADMIN_PASSWORD}